# Tomcat 응답 gzip 압축
# 특히 /api/trace/chart 의 Arrow IPC 바이너리(수십 MB) 가 사내망에서 다운로드만으로
# 5~10초 걸리던 문제. Arrow IPC 는 columnar 라 같은 cmd 문자열/정렬된 숫자가 많아
# 50~70% 압축됨. 4KB 이하 응답은 압축 비용 > 효과 라 min-response-size 로 제외.
server:
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,text/javascript,application/javascript,application/vnd.apache.arrow.stream
    min-response-size: 4096

head:
  reconnect-delay-ms: 5000
  sse:
    push-interval-ms: 1000
    timeout-ms: 300000

tentacle:
  access-mode: ssh
  log-prefix: /home/octo/tentacle
  ssh:
    username: samsung
